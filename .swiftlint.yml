# Latest SwiftLint rules update: 0.63.3
# Style in which SwiftLint reports notes, warnings and errors.
# the rules list - https://realm.github.io/SwiftLint/rule-directory.html
reporter: xcode

included:
  - numberConverter
  - numberConverterTests
  - numberConverterUITests

# Paths to exclude from linting, e.g. your dependencies.
excluded:
  - Carthage
  - Pods
  - DerivedData

# analyzer-only rules (run via `swiftlint analyze`)
analyzer_rules:
  - unused_import

# Enabled rules.
opt_in_rules:

  # Controversial rules. Think twice before enabling or disabling them. 
  # Check which are enabled by default and add to opt_in or disabled rules!
  # - explicit_acl
  # - explicit_top_level_acl
  # - extension_access_modifier
  # - line_length
  # - missing_docs
  # - modifier_order
  # - private_action
  # - private_outlet
  # - prohibited_interface_builder
  # - switch_case_alignment
  # - todo
  # - trailing_comma

  # Highest importance rules.
  - block_based_kvo
  - class_delegate_protocol
  - compiler_protocol_init
  - contains_over_first_not_nil
  - discarded_notification_center_observer
  - duplicate_imports
  - dynamic_inline
  - empty_count
  - empty_parameters
  - empty_string
  - identical_operands
  - legacy_cggeometry_functions
  - legacy_constructor
  - legacy_hashing
  - legacy_nsgeometry_functions
  - legacy_random
  - no_fallthrough_only
  - nslocalizedstring_key
  - operator_usage_whitespace
  - function_name_whitespace
  - private_unit_test
  - redundant_nil_coalescing
  - redundant_objc_attribute
  - redundant_set_access_control
  - redundant_void_return
  - strong_iboutlet
  - trailing_newline
  - trailing_semicolon
  - unneeded_break_in_switch
  - unused_control_flow_label
  - void_return
  - weak_delegate
  - explicit_init # Explicitly calling .init() should be avoided.

  # Medium importance rules
  - array_init
  - closing_brace
  - closure_parameter_position
  - closure_spacing
  - collection_alignment
  - colon
  - comma
  - control_statement
  - empty_parentheses_with_trailing_closure
  - generic_type_name
  - identifier_name
  - implicitly_unwrapped_optional
  - leading_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent # Uncommented when this issue became closed https://github.com/realm/SwiftLint/issues/2709
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_literal_brackets
  - multiline_parameters_brackets
  - multiline_parameters
  - return_arrow_whitespace
  - statement_position
  - syntactic_sugar
  - trailing_whitespace
  - type_name
  - unneeded_parentheses_in_closure_argument
  - unused_setter_value
  - valid_ibinspectable
  - vertical_parameter_alignment
  - vertical_parameter_alignment_on_call
  - vertical_whitespace
  - xctfail_message
  - xct_specific_matcher
  - yoda_condition
  - implicit_return
  - trailing_closure
  - switch_case_alignment
  - prohibited_interface_builder
  - private_action
  - discouraged_optional_boolean
  - discouraged_optional_collection

  # Lowest importance rules
  - convenience_type
  - first_where
  - implicit_getter
  - is_disjoint
  - last_where
  - mark
  - protocol_property_accessors_order
  - implicit_optional_initialization
  - sorted_first_last
  - toggle_bool
  - unused_enumerated
  - single_test_class
  - sorted_imports # Imports should be sorted.
  - number_separator
  - redundant_type_annotation
  - unused_closure_parameter
  - unused_optional_binding
  - static_operator
  - private_outlet
  - modifier_order
  - closure_body_length
  - discouraged_direct_init
  - fallthrough
  - force_cast
  - force_try
  - force_unwrapping
  - for_where
  - overridden_super_call
  - private_over_fileprivate
  - redundant_string_enum_value
  - vertical_whitespace_closing_braces

# project comment convention: comments are lowercase; only TODO and MARK are uppercase.
custom_rules:
  lowercase_comment:
    name: "Lowercase Comment"
    # match `//` line comments that start with an uppercase letter,
    # excluding tooling directives and the allowed TODO / MARK / FIXME markers.
    regex: '//[ \t]*(?!swiftlint:|periphery:|sourcery:|MARK|TODO|FIXME|Created|Copyright|numberConverter|[A-Za-z0-9_]+\.swift)[A-Z]'
    match_kinds:
      - comment
    message: "comments should start with a lowercase letter (only TODO and MARK stay uppercase)"
    severity: warning

# There will be an error if there are more than 5 warnings
warning_threshold: 390

# setting the maximum length of an identifier
identifier_name:
  min_length: 1
  max_length: 60

# setting the maximum class size
type_body_length:
  warning: 500
  error: 750

# setting the maximum nesting level
nesting:
  type_level: 2

# setting the maximum number of lines in the file (ideally, the values should be lowered)
file_length:
  warning: 700
  error: 1400

# setting the maximum number of characters per line, if it is not a URL or comment (ideally, the values should be lowered)
line_length:
  warning: 120
  error: 140
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

# setting the maximum size of the method
function_body_length:
  warning: 40
  error: 1000

# closures shouldn't be longer than ...
closure_body_length:
  warning: 50
  error: 100

# setting the maximum number of method parameters
function_parameter_count:
  warning: 7
  error: 10

# setting the maximum number of parameters in the tuple
large_tuple:
  warning: 5
  error: 5

# setting the maximum length of the name
type_name:
  max_length:
    warning: 50
    error: 100

# there will be an error with excessive brackets
control_statement:
  error

# there will be an error if you specify get tera too much
implicit_getter:
  error

# there will be an error if the method parameters are arranged vertically and not from the same tab
vertical_parameter_alignment:
  error

# there will be an error if there are no necessary spaces when specifying the return value
return_arrow_whitespace:
  error

# there will be an error when specifying arrays and dictionaries in outdated formats
syntactic_sugar:
  error

# disabled rules.
disabled_rules:
  # todos are embraced while the project is in active development.
  - todo
  - conditional_returns_on_newline
  - cyclomatic_complexity
  - discouraged_object_literal
  - object_literal
  - empty_enum_arguments
  - empty_xctest_method
  - explicit_enum_raw_value
  - explicit_self 
  - explicit_type_interface
  - fatal_error_message
  - file_header
  - file_name
  - function_default_parameter_at_end
  - joined_default_parameter
  - let_var_whitespace
  - multiline_function_chains
  - nimble_operator
  - no_extension_access_modifier
  - no_grouping_extension
  - notification_center_detachment
  - override_in_extension
  - pattern_matching_keywords
  - prefixed_toplevel_constant
  - prohibited_super_call
  - required_enum_case
  - strict_fileprivate
  - switch_case_on_newline
  - unavailable_function
  - untyped_error_in_catch
  - vertical_whitespace_between_cases
  - vertical_whitespace_opening_braces
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - opening_brace
  - multiple_closures_with_trailing_closure

# Remember that you can customize this configuration file as much as you want.
